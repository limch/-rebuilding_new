<svg width="512" height="512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e40af;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Rectangle -->
  <rect width="512" height="512" fill="url(#grad1)" rx="80"/>
  
  <!-- Balance Scale Icon -->
  <g transform="translate(256, 256)">
    <!-- Base -->
    <rect x="-120" y="140" width="240" height="20" fill="white" rx="10"/>
    
    <!-- Pillar -->
    <rect x="-15" y="-80" width="30" height="220" fill="white" rx="15"/>
    
    <!-- Top Circle -->
    <circle cx="0" cy="-90" r="25" fill="white"/>
    
    <!-- Left Scale -->
    <line x1="-100" y1="-60" x2="-100" y2="20" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="-100" cy="30" rx="70" ry="20" fill="white" opacity="0.9"/>
    <path d="M -170,-60 L -30,-60" stroke="white" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Right Scale -->
    <line x1="100" y1="-60" x2="100" y2="20" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <ellipse cx="100" cy="30" rx="70" ry="20" fill="white" opacity="0.9"/>
    <path d="M 30,-60 L 170,-60" stroke="white" stroke-width="8" stroke-linecap="round"/>
    
    <!-- Balance Beam -->
    <rect x="-170" y="-70" width="340" height="12" fill="white" rx="6"/>
  </g>
  
  <!-- Text -->
  <text x="256" y="450" font-family="Arial, sans-serif" font-size="48" font-weight="bold" fill="white" text-anchor="middle">재건축·재개발</text>
  <text x="256" y="490" font-family="Arial, sans-serif" font-size="32" fill="rgba(255,255,255,0.9)" text-anchor="middle">법령 AI</text>
</svg>
